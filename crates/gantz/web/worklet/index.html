<!DOCTYPE html>
<!--
The AudioWorklet build of the gantz website: identical to ../index.html, except that it

- enables cpal's `audioworklet` backend (the `audioworklet` cargo feature + the wasm-threads
  build flags from `Trunk.worklet.toml` / `pkgs/wasm-threads-env.nix`), running audio on a
  dedicated Web Audio thread instead of the deprecated main-thread ScriptProcessor;
- loads `coi-serviceworker.min.js`, which provides the cross-origin isolation that
  SharedArrayBuffer (WASM threads) requires on header-less hosts like GitHub Pages (a no-op
  when real COOP/COEP headers are served);
- drops the PWA service worker: only one service worker can own the scope, and the
  cross-origin-isolation worker wins (offline caching is the legacy build's concern).

Keep the shared parts in sync with ../index.html when editing either.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <!-- Cross-origin isolation for SharedArrayBuffer on header-less hosts (e.g. GitHub
         Pages); a no-op when the server already sends COOP/COEP headers. -->
    <script src="coi-serviceworker.min.js"></script>

    <!-- trunk asset directives -->
    <link data-trunk rel="rust" href="../../Cargo.toml" data-bin="gantz"
          data-cargo-features="audioworklet"
          data-cargo-profile-release="wasm_release"
          data-wasm-opt="z"
          data-wasm-opt-params="--enable-simd --enable-threads --enable-mutable-globals --enable-bulk-memory --enable-reference-types --enable-multivalue --enable-tail-call --enable-nontrapping-float-to-int"
          data-initializer="../initializer.js" />
    <link data-trunk rel="copy-file" href="../coi-serviceworker.min.js" />

    <title>gantz</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100%;
            background-color: #1b1b1b;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        canvas:focus {
            outline: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-family: sans-serif;
            text-align: center;
        }
        #loading-title {
            font-size: 18px;
            letter-spacing: 0.5em;
            margin: 0 0 12px 0;
        }
        #loading-track {
            width: 100%;
            height: 2px;
            background: #333;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: #f0f0f0;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="loading">
        <p id="loading-title">g a n t z</p>
        <div id="loading-track"><div id="loading-bar"></div></div>
    </div>
    <script>
        document.body.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        // Insert hack to make sound autoplay on Chrome as soon as the user interacts with the tab:
        // https://developers.google.com/web/updates/2018/11/web-audio-autoplay#moving-forward
        (function () {
            const audioContextList = [];
            const userInputEventNames = [
                "click", "contextmenu", "auxclick", "dblclick",
                "mousedown", "mouseup", "pointerup", "touchend",
                "keydown", "keyup",
            ];

            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    const result = new target(...args);
                    audioContextList.push(result);
                    return result;
                },
            });

            function resumeAllContexts(_event) {
                let count = 0;
                audioContextList.forEach((context) => {
                    if (context.state !== "running") {
                        context.resume();
                    } else {
                        count++;
                    }
                });

                if (count > 0 && count === audioContextList.length) {
                    userInputEventNames.forEach((eventName) => {
                        document.removeEventListener(eventName, resumeAllContexts);
                    });
                }
            }

            userInputEventNames.forEach((eventName) => {
                document.addEventListener(eventName, resumeAllContexts);
            });
        })();
    </script>
</body>
</html>
