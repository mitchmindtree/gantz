<!DOCTYPE html>
<!--
The gantz website. Audio runs on cpal's AudioWorklet backend (a dedicated Web Audio thread over
WASM threads), selected by the `audioworklet` cargo feature (the app's default) plus the
wasm-threads build flags in `Trunk.toml` / `pkgs/wasm-threads-env.nix`. `coi-serviceworker.min.js`
supplies the cross-origin isolation that SharedArrayBuffer (WASM threads) needs on header-less
hosts like GitHub Pages (a no-op when real COOP/COEP headers are served). There is no PWA service
worker: only one service worker can own the scope, and the cross-origin-isolation worker wins.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <!-- Cross-origin isolation for SharedArrayBuffer on header-less hosts (e.g. GitHub
         Pages); a no-op when the server already sends COOP/COEP headers. -->
    <script src="coi-serviceworker.min.js"></script>

    <!-- trunk asset directives -->
    
<script type="module">
async function __trunkInitializer(init, source, sourceSize, initializer, initWithObject) {
  if (initializer === undefined) {
    return await init(initWithObject ? { module_or_path: source } : source);
  }

  const {
    onStart, onProgress, onComplete, onSuccess, onFailure
  } = initializer;

  onStart?.();

  const response = fetch(source)
      .then((response) => {
        const reader = response.body.getReader();
        const headers = response.headers;
        const status = response.status;
        const statusText = response.statusText;

        const total = sourceSize;
        let current = 0;

        const stream = new ReadableStream({
          start(controller) {
            function push() {
              reader.read().then(({done, value}) => {
                if (done) {
                  onProgress?.({current: total, total});
                  controller.close();
                  return;
                }

                current += value.byteLength;
                onProgress?.({current, total});
                controller.enqueue(value);
                push();
              });
            }

            push();
          },
        });

        return {
          stream, init: {
            headers, status, statusText
          }
        };
      })
      .then(({stream, init}) =>
          new Response(stream, init),
      );

  return init(initWithObject ? { module_or_path: response } : response)
      .then((value) => {
        onComplete?.();
        onSuccess?.(value);
        return value;
      }, (reason) => {
        onComplete?.();
        onFailure?.(reason);
        return reason;
      });
}


import init, * as bindings from './gantz.js';
import initializer from './initializer.js';

const wasm = await __trunkInitializer(init, './gantz_bg.wasm', 25031251, initializer(), true);


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    

    <title>gantz</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100%;
            background-color: #1b1b1b;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        canvas:focus {
            outline: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-family: sans-serif;
            text-align: center;
        }
        #loading-title {
            font-size: 18px;
            letter-spacing: 0.5em;
            margin: 0 0 12px 0;
        }
        #loading-track {
            width: 100%;
            height: 2px;
            background: #333;
        }
        #loading-bar {
            width: 0%;
            height: 100%;
            background: #f0f0f0;
            transition: width 0.2s ease;
        }
    </style>
<link rel="modulepreload" href="./gantz.js" crossorigin="anonymous"><link rel="modulepreload" href="./initializer.js" crossorigin="anonymous"><link rel="preload" href="./gantz_bg.wasm" crossorigin="anonymous" as="fetch" type="application/wasm"></head>
<body>
    <div id="loading">
        <p id="loading-title">g a n t z</p>
        <div id="loading-track"><div id="loading-bar"></div></div>
    </div>
    <script>
        document.body.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        // Insert hack to make sound autoplay on Chrome as soon as the user interacts with the tab:
        // https://developers.google.com/web/updates/2018/11/web-audio-autoplay#moving-forward
        (function () {
            const audioContextList = [];
            const userInputEventNames = [
                "click", "contextmenu", "auxclick", "dblclick",
                "mousedown", "mouseup", "pointerup", "touchend",
                "keydown", "keyup",
            ];

            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    const result = new target(...args);
                    audioContextList.push(result);
                    return result;
                },
            });

            function resumeAllContexts(_event) {
                let count = 0;
                audioContextList.forEach((context) => {
                    if (context.state !== "running") {
                        context.resume();
                    } else {
                        count++;
                    }
                });

                if (count > 0 && count === audioContextList.length) {
                    userInputEventNames.forEach((eventName) => {
                        document.removeEventListener(eventName, resumeAllContexts);
                    });
                }
            }

            userInputEventNames.forEach((eventName) => {
                document.addEventListener(eventName, resumeAllContexts);
            });
        })();
    </script>
</body>
</html>
